<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio Adventures</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Georgia, serif;
}

/* HEADER hidden first */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(-20px);
  transition: 0.4s;
  z-index: 2000;
}

.topbar.visible {
  opacity: 1;
  transform: translateY(0);
}

.nav-left {
  position: absolute;
  left: 20px;
  top: 24px;
  font-size: 13px;
}

.nav-center {
  position: absolute;
  left: 50%;
  top: 18px;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 30px;
}

.nav-right {
  position: absolute;
  right: 20px;
  top: 18px;
  font-size: 28px;
  cursor: pointer;
}

/* MENU */
.menu {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.menu.active {
  bottom: 0;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center 25% / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4));
}

/* FLASH */
@keyframes flash {
  0%, 94%, 100% { opacity: 0; }
  95% { opacity: 0.4; }
}

.flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,200,150,0.4), transparent 60%);
  animation: flash 5s infinite;
}

.hero-content {
  position: relative;
  text-align: center;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: 60px;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: 1px solid white;
  display: inline-block;
  color: white;
  text-decoration: none;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar" id="header">
  <a href="#shop" class="nav-left">SHOP</a>
  <div class="nav-center">IGNACIO</div>
  <div class="nav-right" id="menuBtn">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#read">Read</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="flash"></div>
  <div class="hero-content">
    <h1>IGNACIO</h1>
    <a href="#read" class="btn">READ</a>
  </div>
</div>

<script>

/* HEADER SHOW ON SCROLL */
window.addEventListener("scroll", () => {
  const header = document.getElementById("header");
  header.classList.toggle("visible", window.scrollY > 50);
});

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

menuBtn.onclick = () => {
  const open = menu.classList.toggle("active");
  menuBtn.textContent = open ? "✕" : "☰";
};

</script>

</body>
</html>
