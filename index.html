<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ignacio Adventures</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

/* RESET */
body {
  margin: 0;
  background: #0b0b0b;
  color: #eaeaea;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* NAV */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  z-index: 1000;
}

.nav-left {
  position: absolute;
  left: 20px;
  top: 25px;
  font-size: 14px;
  letter-spacing: 2px;
}

.nav-center {
  position: absolute;
  left: 50%;
  top: 20px;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 4px;
}

.nav-right {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 24px;
  cursor: pointer;
}

.topbar a {
  color: white;
  text-decoration: none;
}

/* MENU */
.menu {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.5s;
}

.menu.active {
  bottom: 0;
}

.menu a {
  display: block;
  font-size: 28px;
  margin: 20px;
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), #0b0b0b);
}

.hero div {
  position: relative;
  z-index: 2;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(40px, 8vw, 70px);
}

h2 {
  font-size: clamp(18px, 4vw, 26px);
  max-width: 600px;
}

/* SECTIONS */
section {
  min-height: 120vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 10px 24px;
  border: 1px solid white;
  display: inline-block;
}

/* SLIDER */
.slider {
  width: 100%;
  overflow: hidden;
}

.slider-track {
  display: flex;
  animation: scroll 20s linear infinite;
}

.slide {
  min-width: 300px;
  margin: 0 20px;
}

.slide img {
  width: 100%;
}

/* slider animation */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* CURSOR */
.cursor {
  width: 40px;
  height: 40px;
  border: 1px solid white;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 2000;
}

.cursor.dot {
  width: 8px;
  height: 8px;
  background: white;
  border: none;
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- NAV -->
<div class="topbar">
  <a href="#" class="nav-left">HOME</a>
  <div class="nav-center">IGNACIO</div>
  <div class="nav-right" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>ADVENTURES</h1>
    <h2>UPRISING & EXILE</h2>
    <a href="#shop" class="btn">ENTER</a>
  </div>
</div>

<!-- STORY -->
<section><h2 class="fade">Lithuania, 1831</h2></section>
<section><h2 class="fade">The retreat from Kaunas</h2></section>
<section><h2 class="fade">Survival becomes the only objective</h2></section>

<!-- HEROES -->
<section>
  <div>
    <h2>Our Heroes</h2>
    <div class="slider">
      <div class="slider-track">
        <div class="slide"><img src="images/hero1.jpg"></div>
        <div class="slide"><img src="images/hero2.jpg"></div>
        <div class="slide"><img src="images/hero3.jpg"></div>
        <div class="slide"><img src="images/hero1.jpg"></div>
        <div class="slide"><img src="images/hero2.jpg"></div>
        <div class="slide"><img src="images/hero3.jpg"></div>
      </div>
    </div>
  </div>
</section>

<!-- SHOP -->
<section id="shop">
  <div>
    <h2>Volume I</h2>
    <p>1831 uprising</p>
    <a href="https://buy.stripe.com/9B63cu21jdfmbJD2pCfrW03" target="_blank" class="btn">
      BUY — €12
    </a>
  </div>
</section>

<script>

/* MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

/* FADE */
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

faders.forEach(el => observer.observe(el));

/* CURSOR FOLLOW */
const cursor = document.querySelector('.cursor');

let mouseX = 0, mouseY = 0;
let posX = 0, posY = 0;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  posX += (mouseX - posX) * 0.1;
  posY += (mouseY - posY) * 0.1;

  cursor.style.left = posX + "px";
  cursor.style.top = posY + "px";

  requestAnimationFrame(animate);
}

animate();

/* CURSOR HOVER */
document.querySelectorAll('a, .btn').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('dot'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('dot'));
});

</script>

</body>
</html>
