<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

/* BASE */

body {
  margin: 0;
  background: #0b0b0b;
  color: #eaeaea;
  font-family: 'Playfair Display', serif;
}

/* TOP BAR */

.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.nav-left {
  font-size: 14px; /* bigger */
  letter-spacing: 3px;
  color: white;
  text-decoration: none;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 5px;
}

.nav-center a {
  color: white;
  text-decoration: none;
}

.nav-right {
  font-size: 22px;
  cursor: pointer;
}

/* MENU OVERLAY */

.menu-overlay {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: bottom 0.6s ease;
  z-index: 2000;
}

.menu-overlay.active {
  bottom: 0;
}

.menu-overlay a {
  display: block;
  font-size: 28px;
  margin: 20px;
  color: white;
  text-decoration: none;
}

/* SECTIONS */

section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 20px;
}

/* HERO */

.title {
  font-family: 'Cinzel', serif;
  font-size: 70px;
  letter-spacing: 6px;
}

.subtitle {
  font-size: 18px;
  letter-spacing: 6px;
  opacity: 0.7;
}

/* BUTTON */

.main-btn {
  margin-top: 30px;
  padding: 12px 28px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  letter-spacing: 3px;
}

.main-btn:hover {
  background: white;
  color: black;
}

/* ANIMATION */

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE */

img {
  width: 100%;
  max-width: 800px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="#shop" class="nav-left">SHOP</a>

  <div class="nav-center">
    <a href="#">IGNACIO</a>
  </div>

  <div class="nav-right" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#signup">Sign Up</a>
  </div>
</div>

<!-- HERO -->
<section>
  <div class="fade">
    <h1 class="title">IGNACIO</h1>
    <h2 class="subtitle">ADVENTURES</h2>
    <a href="#signup" class="main-btn">SIGN UP</a>
  </div>
</section>

<section>
  <h2 class="fade">Lithuania, 1831</h2>
</section>

<section>
  <img src="images/panel1.jpg">
</section>

<section>
  <h2 class="fade">The retreat from Kaunas</h2>
</section>

<section>
  <img src="images/panel2.jpg">
</section>

<section>
  <h2 class="fade">Survival becomes the only objective</h2>
</section>

<section>
  <img src="images/panel3.jpg">
</section>

<section id="shop">
  <h2 class="fade">Shop coming soon</h2>
</section>

<section id="signup">
  <h2 class="fade">Join the Chronicle</h2>
</section>

<footer>
  © Ignacio Adventures — All Rights Reserved
</footer>

<script>

/* FADE */

const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

faders.forEach(el => observer.observe(el));

/* MENU */

function toggleMenu() {
  document.getElementById('menu').classList.toggle('active');
}

</script>

</body>
</html>
