<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ignacio Adventures</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  background: #000;
  color: #eaeaea;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.2);
  z-index: 2000;
}

.nav-center {
  position: absolute;
  left: 50%;
  top: 18px;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 30px;
  letter-spacing: 6px;
  color: white;
}

.nav-right {
  position: absolute;
  right: 20px;
  top: 18px;
  font-size: 28px;
  cursor: pointer;
  z-index: 3000;
}

/* MENU */
.menu {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
  z-index: 2500;
}

.menu.active {
  bottom: 0;
}

.menu a {
  display: block;
  font-size: 28px;
  margin: 20px;
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center 20% / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

/* LIGHTER OVERLAY */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

/* FLASH */
@keyframes flash {
  0%, 95%, 100% { opacity: 0; }
  96% { opacity: 0.2; }
}

.flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,200,150,0.2), transparent 70%);
  animation: flash 6s infinite;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 700px;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(42px, 8vw, 80px);
}

h2 {
  font-size: clamp(18px, 4vw, 26px);
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 28px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
}

/* SECTIONS */
section {
  min-height: 110vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* CURSOR desktop only */
@media (pointer: fine) {
  .cursor {
    width: 40px;
    height: 40px;
    border: 1px solid white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 3000;
  }

  .cursor.dot {
    width: 8px;
    height: 8px;
    background: white;
    border: none;
  }
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- HEADER -->
<div class="topbar">
  <div class="nav-center">IGNACIO</div>
  <div class="nav-right" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#read">Read</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="flash"></div>

  <div class="hero-content">
    <h2>LEGITCOMICS PRESENTS</h2>
    <h1>IGNACIO</h1>
    <h2>WHERE HEROES BECOME LEGENDS</h2>

    <a href="#read" class="btn">READ</a>
  </div>
</div>

<!-- STORY -->
<section id="read">
  <h2 class="fade">Lithuania, 1831</h2>
</section>

<section>
  <h2 class="fade">The retreat from Kaunas</h2>
</section>

<section>
  <h2 class="fade">Survival becomes the only objective</h2>
</section>

<script>

/* MENU FIX */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

/* FADE */
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

faders.forEach(el => observer.observe(el));

/* CURSOR desktop only */
if (window.matchMedia("(pointer: fine)").matches) {
  const cursor = document.querySelector('.cursor');

  let mouseX = 0, mouseY = 0;
  let posX = 0, posY = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    posX += (mouseX - posX) * 0.1;
    posY += (mouseY - posY) * 0.1;

    cursor.style.left = posX + "px";
    cursor.style.top = posY + "px";

    requestAnimationFrame(animate);
  }

  animate();

  document.querySelectorAll('a, .btn').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('dot'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('dot'));
  });
}

</script>

</body>
</html>
