<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Georgia, serif;
}

a {
  color: white;
  text-decoration: none;
}

/* HEADER */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(-20px);
  transition: 0.4s;
}

.topbar.visible {
  opacity: 1;
  transform: translateY(0);
}

.nav-left {
  position: absolute;
  left: 20px;
  top: 24px;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 18px;
  font-family: 'Cinzel', serif;
  font-size: 28px;
}

.nav-right {
  position: absolute;
  right: 20px;
  top: 18px;
  font-size: 26px;
  cursor: pointer;
}

/* MENU */
.menu {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.menu.active {
  bottom: 0;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-content {
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  animation: fade 1.5s forwards;
}

@keyframes fade {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.btn {
  border: 1px solid white;
  padding: 10px 20px;
  display: inline-block;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar" id="header">
  <a href="#shop" class="nav-left">SHOP</a>
  <div class="nav-center">IGNACIO</div>
  <div class="nav-right" id="menuBtn">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#read">Read</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>IGNACIO</h1>
    <a href="#read" class="btn">READ</a>
  </div>
</div>

<script>

/* HEADER */
window.addEventListener("scroll", () => {
  document.getElementById("header")
    .classList.toggle("visible", window.scrollY > 50);
});

/* MENU */
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

btn.onclick = () => {
  const open = menu.classList.toggle("active");
  btn.textContent = open ? "✕" : "☰";
};

</script>

</body>
</html>
