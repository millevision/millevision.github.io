<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Oswald:wght@500&display=swap" rel="stylesheet">

<style>

/* BASE */

body {
  margin: 0;
  background: #0b0b0b;
  color: #eaeaea;
  font-family: 'Playfair Display', serif;
  overflow-x: hidden;
}

/* TOP BAR */

.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 30px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.nav-left {
  font-size: 12px;
  letter-spacing: 3px;
  text-decoration: none;
  color: #eaeaea;
  opacity: 0.8;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  letter-spacing: 6px;
}

.nav-right {
  font-size: 22px;
  cursor: pointer;
}

/* SECTIONS */

section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 40px;
}

/* HERO */

.title {
  font-size: 90px;
  letter-spacing: 8px;
}

.subtitle {
  font-size: 16px;
  letter-spacing: 8px;
  opacity: 0.6;
}

/* TEXT FADE */

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.2s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE FADE */

.fade-img {
  opacity: 0;
  transform: scale(1.05);
  transition: all 1.5s ease;
}

.fade-img.visible {
  opacity: 1;
  transform: scale(1);
}

.image img {
  width: 100%;
  height: auto;
  display: block;
}

/* FLASH (war effect) */

@keyframes flash {
  0%, 92%, 100% { opacity: 0; }
  93% { opacity: 0.15; }
  94% { opacity: 0; }
  96% { opacity: 0.1; }
}

.hero-flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,200,150,0.25) 0%, rgba(0,0,0,0) 70%);
  pointer-events: none;
  animation: flash 6s infinite;
}

/* BUTTON */

.btn {
  display: inline-block;
  margin: 20px;
  padding: 12px 24px;
  border: 1px solid #aaa;
  text-decoration: none;
  color: white;
  font-size: 12px;
  letter-spacing: 2px;
}

/* FOOTER */

footer {
  text-align: center;
  padding: 40px;
  font-size: 12px;
  opacity: 0.5;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="nav-left">☰</div>

  <div class="nav-center">IGNACIO</div>

  <a href="#shop" class="nav-right">SHOP</a>
</div>

<!-- HERO -->
<section style="position:relative; overflow:hidden; flex-direction:column;">
  <div class="hero-flash"></div>

  <div class="fade">
    <h1 class="title">IGNACIO</h1>
    <h2 class="subtitle">ADVENTURES</h2>

    <div>
      <a href="#shop" class="btn">SHOP</a>
      <a href="#signup" class="btn">SIGN UP</a>
    </div>
  </div>
</section>

<!-- STORY -->
<section>
  <h2 class="fade">Lithuania, 1831.<br>The uprising begins.</h2>
</section>

<!-- IMAGE -->
<section class="image">
  <img src="images/panel1.jpg" class="fade-img">
</section>

<section>
  <h2 class="fade">The retreat from Kaunas…</h2>
</section>

<section class="image">
  <img src="images/panel2.jpg" class="fade-img">
</section>

<section>
  <h2 class="fade">Survival becomes the only objective.</h2>
</section>

<section class="image">
  <img src="images/panel3.jpg" class="fade-img">
</section>

<section>
  <h2 class="fade">
    <span style="color:crimson;">Volume I — The Uprising</span><br><br>
    Part of a trilogy
  </h2>
</section>

<!-- SHOP -->
<section id="shop">
  <h2 class="fade">Shop coming soon</h2>
</section>

<!-- SIGNUP -->
<section id="signup">
  <h2 class="fade">Join the Chronicle</h2>
</section>

<footer>
  © Ignacio Adventures — All Rights Reserved
</footer>

<!-- SCRIPT -->
<script>
const faders = document.querySelectorAll('.fade, .fade-img');

const appearOptions = { threshold: 0.2 };

const appearOnScroll = new IntersectionObserver(function(entries) {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    entry.target.classList.add('visible');
  });
}, appearOptions);

faders.forEach(fader => {
  appearOnScroll.observe(fader);
});
</script>

</body>
</html>
