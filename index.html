<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio Adventures</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: 'Playfair Display', serif;
}

/* TOP BAR */

.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 9999;
  box-sizing: border-box;
}

/* LEFT (SHOP) */
.nav-left {
  font-size: 14px;
  letter-spacing: 2px;
  text-decoration: none;
  color: white;
}

/* CENTER (LOGO) */
.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 20px;
}

.nav-center a {
  color: white;
  text-decoration: none;
}

/* RIGHT (MENU) */
.nav-right {
  position: absolute;
  right: 20px;
  font-size: 26px;
  cursor: pointer;
}

/* MENU OVERLAY */

.menu-overlay {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0b0b0b;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: bottom 0.5s ease;
  z-index: 9998;
}

.menu-overlay.active {
  bottom: 0;
}

.menu-overlay a {
  display: block;
  font-size: 30px;
  margin: 20px;
  text-decoration: none;
  color: white;
}

/* SECTIONS */

section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 100px 20px;
}

/* HERO */

h1 {
  font-family: 'Cinzel', serif;
  font-size: 60px;
}

h2 {
  font-size: 18px;
}

.main-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
}

/* FADE */

.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE */

img {
  width: 100%;
  max-width: 700px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="#shop" class="nav-left">SHOP</a>

  <div class="nav-center">
    <a href="#">IGNACIO</a>
  </div>

  <div class="nav-right" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu-overlay" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#signup">Sign Up</a>
  </div>
</div>

<!-- HERO -->
<section>
  <div class="fade">
    <h1>IGNACIO</h1>
    <h2>ADVENTURES</h2>
    <a href="#signup" class="main-btn">SIGN UP</a>
  </div>
</section>

<section>
  <h2 class="fade">Lithuania, 1831</h2>
</section>

<section>
  <img src="images/panel1.jpg">
</section>

<section>
  <h2 class="fade">The retreat from Kaunas</h2>
</section>

<section>
  <img src="images/panel2.jpg">
</section>

<section>
  <h2 class="fade">Survival becomes the only objective</h2>
</section>

<section>
  <img src="images/panel3.jpg">
</section>

<section id="shop">
  <h2 class="fade">Shop coming soon</h2>
</section>

<section id="signup">
  <h2 class="fade">Join the Chronicle</h2>
</section>

<footer style="text-align:center; padding:40px; font-size:12px;">
  © Ignacio Adventures — All Rights Reserved
</footer>

<script>

/* FADE */

const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

faders.forEach(el => observer.observe(el));

/* MENU */

function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

</script>

</body>
</html>
