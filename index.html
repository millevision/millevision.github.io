<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ignacio’s Adventures</title>

<style>.fade-img {
  opacity: 0;
  transform: scale(1.05);
  transition: all 1.5s ease;
}

.fade-img.visible {
  opacity: 1;
  transform: scale(1);
}@keyframes flash {
  0%, 92%, 100% {
    opacity: 0;
  }
  93% {
    opacity: 0.15;
  }
  94% {
    opacity: 0;
  }
  96% {
    opacity: 0.1;
  }
}

.hero-flash {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  pointer-events: none;
  animation: flash 6s infinite;
}
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #0b0b0b;
  color: #eaeaea;
}

section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

h1 {
  font-size: 48px;
  letter-spacing: 2px;
}

h2 {
  font-size: 28px;
  font-weight: normal;
  max-width: 700px;
}

.image {
  padding: 0;
}

.image img {
  width: 100%;
  height: auto;
  display: block;
}

.accent {
  color: crimson;
}.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.2s ease;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<section style="position:relative; overflow:hidden;">
  
  <div class="hero-flash"></div>

  <div>
    <h1>IGNACIO’S ADVENTURES</h1>
    <h2>A Chronicle of War and Exile</h2>
  </div>

</section>

<section>
  <h2 class="fade">Lithuania, 1831.<br>The uprising begins.</h2>
</section>

<section class="image">
  <img src="images/panel1.jpg">
</section>

<section>
  <h2>The retreat from Kaunas…</h2>
</section>

<section class="image">
  <img src="images/panel2.jpg">
</section>

<section>
  <h2>Survival becomes the only objective.</h2>
</section>

<section class="image">
  <img src="images/panel3.jpg">
</section>

<section>
  <h2>
    <span class="accent">Volume I — The Uprising</span><br><br>
    Part of a trilogy
  </h2>
</section>

</body>
</html>
