<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ignacio Adventures</title>

<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  background: #000;
  color: #eaeaea;
  font-family: Georgia, serif;
  overflow-x: hidden;
}

/* NAV */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 80px;
  z-index: 1000;
}

.nav-left {
  position: absolute;
  left: 20px;
  top: 28px;
  font-size: 14px;
  letter-spacing: 2px;
}

.nav-center {
  position: absolute;
  left: 50%;
  top: 18px;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif;
  font-size: 34px;
  letter-spacing: 6px;
}

.nav-right {
  position: absolute;
  right: 20px;
  top: 20px;
  font-size: 28px;
  cursor: pointer;
}

.topbar a {
  color: white;
  text-decoration: none;
}

/* MENU */
.menu {
  position: fixed;
  bottom: -100%;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.menu.active {
  bottom: 0;
}

.menu a {
  display: block;
  font-size: 28px;
  margin: 20px;
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('images/hero.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.6), #000);
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 700px;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(42px, 8vw, 80px);
  margin: 10px 0;
}

h2 {
  font-size: clamp(18px, 4vw, 26px);
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 15px;
  padding: 12px 28px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  letter-spacing: 2px;
}

/* SECTIONS */
section {
  min-height: 110vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.visible {
  opacity: 1;
  transform: translateY(0);
}

/* CURSOR (desktop only) */
@media (pointer: fine) {
  .cursor {
    width: 40px;
    height: 40px;
    border: 1px solid white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 2000;
  }

  .cursor.dot {
    width: 8px;
    height: 8px;
    background: white;
    border: none;
  }
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- NAV -->
<div class="topbar">
  <a href="#" class="nav-left">SHOP</a>
  <a href="#" class="nav-center">IGNACIO</a>
  <div class="nav-right" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>LEGITCOMICS PRESENTS</h2>
    <h1>IGNACIO</h1>
    <h2>WHERE HEROES BECOME LEGENDS</h2>

    <a href="#shop" class="btn">SHOP</a>
    <a href="#read" class="btn">READ</a>
  </div>
</div>

<!-- STORY -->
<section id="read">
  <h2 class="fade">Lithuania, 1831</h2>
</section>

<section>
  <h2 class="fade">The retreat from Kaunas</h2>
</section>

<section>
  <h2 class="fade">Survival becomes the only objective</h2>
</section>

<!-- SHOP -->
<section id="shop">
  <div>
    <h2>Volume I</h2>
    <p>1831 uprising</p>
    <a href="https://buy.stripe.com/9B63cu21jdfmbJD2pCfrW03" target="_blank" class="btn">
      BUY — €12
    </a>
  </div>
</section>

<script>

/* MENU */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

/* FADE */
const faders = document.querySelectorAll('.fade');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

faders.forEach(el => observer.observe(el));

/* CURSOR (desktop only) */
if (window.matchMedia("(pointer: fine)").matches) {
  const cursor = document.querySelector('.cursor');

  let mouseX = 0, mouseY = 0;
  let posX = 0, posY = 0;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function animate() {
    posX += (mouseX - posX) * 0.1;
    posY += (mouseY - posY) * 0.1;

    cursor.style.left = posX + "px";
    cursor.style.top = posY + "px";

    requestAnimationFrame(animate);
  }

  animate();

  document.querySelectorAll('a, .btn').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('dot'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('dot'));
  });
}

</script>

</body>
</html>
